<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Diseñar una tarjeta con imagen (img), título (h2) y texto (p) -->
    <!-- Usando Selectores: pseudo-clases, descendientes y de etiqueta. -->
    <div class="card">
    <img src="img1.jpg" alt="Gamer 1">
    <h2>Jugador Pro</h2>
    <p>Especialista en shooters competitivos y estrategias avanzadas.</p>
    </div>

    <div class="card">
        <img src="img2.jpg" alt="Gamer 2">
        <h2>Streamer Elite</h2>
        <p>Contenido en vivo con gameplay épico y comunidad activa.</p>
    </div>

    <div class="card">
        <img src="img3.jpg" alt="Gamer 3">
        <h2>Master RPG</h2>
        <p>Explorador de mundos abiertos y misiones legendarias.</p>
    </div>
</body>
</html>
